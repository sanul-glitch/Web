<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Ahsan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Foto Profil Placeholder */
        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--accent-color), #818cf8);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        h3 {
            font-size: 0.85rem;
            margin-bottom: 15px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .social-list li a {
            display: block;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-list li a:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        /* Interest Chips - Biar nggak kelihatan sepi banget */
        .interests {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .chip {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--accent-color);
        }

        .btn-back-minimal {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.3s;
            margin-top: 10px;
        }
        
        .btn-back-minimal::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s;
        }

        .btn-back-minimal:hover {
            color: var(--accent-color);
        }

        .btn-back-minimal:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">A</div>
        
        <h1>About Me</h1>
        <p class="description">"Sebenarnya pengen ngisi, tapi lagi males."</p>
        <hr>
        
        <h3>Find Me On</h3>
        <ul class="social-list">
            <li><a href="https://www.instagram.com/ash.null._/" target="_blank">Instagram</a></li>
            <li><a href="Error Not Found.html">Facebook</a></li>
            <li><a href="https://steamcommunity.com/profiles/76561199278689850/" target="_blank">Steam</a></li>
            <li><a href="Error Not Found.html">Hoyoverse</a></li>
        </ul>

        <hr>
        
        <h3>Navigation</h3>
        <div>
            <a href="Ahsan Web.html" class="btn-back-minimal">← BACK TO HOME</a>
        </div>
    </div>

</body>
</html>
