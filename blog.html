<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahsan's Blog</title>
    <style>
        /* Variabel Warna agar mudah diubah */
        :root {
            --bg-color: #0f172a;        /* Navy Gelap */
            --card-bg: #1e293b;        /* Abu-abu Biru */
            --text-main: #f1f5f9;      /* Putih tulang */
            --text-muted: #94a3b8;     /* Abu-abu teks */
            --accent: #3b82f6;         /* Biru terang */
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.7;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigasi Simpel */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 50px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 20px;
            opacity: 0.8;
        }

        nav a:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* Header / Judul Blog */
        header {
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* List Artikel */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        article {
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            transition: 0.3s;
        }

        .post-date {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        article h2 {
            margin: 0 0 12px 0;
            font-size: 1.5rem;
        }

        article h2 a {
            color: var(--text-main);
            text-decoration: none;
        }

        article h2 a:hover {
            color: var(--accent);
        }

        article p {
            color: var(--text-muted);
            margin: 0;
        }

        /* Footer */
        footer {
            margin-top: 80px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsif */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            body { padding: 15px; }
        }

        .btn-back {
        position: fixed;
        top: 20px;
        left: 20px;
        background-color: var(--card); /* Mengikuti warna card kamu */
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 1000;
        cursor: pointer;
    }

    .btn-back:hover {
        background-color: var(--primary); /* Warna biru saat di-hover */
        transform: translateX(-5px);
    }
    </style>
</head>
<body>
    <header>
        <h1>Ahsan's Blog</h1>
        <p>Catatan Yapping</p>
    </header>

    <main class="post-list">
        <article>
            <span class="post-date">RELEASE DATE</span>
            <h2><a href="Error Not Found.html">TITLE</a></h2>
            <p>SHORT DESCRIPTION</p>
        </article>
    </main>
            <a href="Ahsan Web.html" class="btn-back">BACK</a>

    <footer>
        <p>Copyright &copy; 2026 Ahsan. Dibuat dengan semangat belajar.</p>
    </footer>

</body>
</html>
